<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ECCLESIASTES 1</title>
  <meta name="description" content="King James Version">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div class="desktop-message">
    <p>THIS IS DESIGNED FOR MOBILE</p>
    <div class="phone-frame">
      <div class="phone-notch"></div>
      <div class="phone-screen">
        <p class="phone-preview-text">Vanity of vanities,<br>saith the Preacher,<br>vanity of vanities;<br>all is vanity.</p>
      </div>
    </div>
  </div>

  <div class="mobile-content">

    <div class="header" onclick="toggle()">
      <span class="header-title" id="headerTitle">ECCLESIASTES 1</span>
      <span class="header-sub">KJV</span>
    </div>

    <!-- READING -->
    <div class="reading-view" id="readingView">
      <div class="swipe-container" id="swipeContainer">
        <div class="swipe-track" id="swipeTrack"></div>
      </div>
    </div>

    <!-- NAV (same style, just replaces reading view) -->
    <div class="nav-view" id="navView">
      <div class="nav-scroll">
        <div class="nav-inner" id="navInner"></div>
      </div>
    </div>

    <div class="loading" id="loading">...</div>

  </div>

  <script>
    const BOOKS = [
      {name:"Genesis",ch:50},{name:"Exodus",ch:40},{name:"Leviticus",ch:27},
      {name:"Numbers",ch:36},{name:"Deuteronomy",ch:34},{name:"Joshua",ch:24},
      {name:"Judges",ch:21},{name:"Ruth",ch:4},{name:"1 Samuel",ch:31},
      {name:"2 Samuel",ch:24},{name:"1 Kings",ch:22},{name:"2 Kings",ch:25},
      {name:"1 Chronicles",ch:29},{name:"2 Chronicles",ch:36},{name:"Ezra",ch:10},
      {name:"Nehemiah",ch:13},{name:"Esther",ch:10},{name:"Job",ch:42},
      {name:"Psalms",ch:150},{name:"Proverbs",ch:31},{name:"Ecclesiastes",ch:12},
      {name:"Song of Solomon",api:"Song",ch:8},{name:"Isaiah",ch:66},{name:"Jeremiah",ch:52},
      {name:"Lamentations",ch:5},{name:"Ezekiel",ch:48},{name:"Daniel",ch:12},
      {name:"Hosea",ch:14},{name:"Joel",ch:3},{name:"Amos",ch:9},
      {name:"Obadiah",ch:1},{name:"Jonah",ch:4},{name:"Micah",ch:7},
      {name:"Nahum",ch:3},{name:"Habakkuk",ch:3},{name:"Zephaniah",ch:3},
      {name:"Haggai",ch:2},{name:"Zechariah",ch:14},{name:"Malachi",ch:4},
      {name:"Matthew",ch:28},{name:"Mark",ch:16},{name:"Luke",ch:24},
      {name:"John",ch:21},{name:"Acts",ch:28},{name:"Romans",ch:16},
      {name:"1 Corinthians",ch:16},{name:"2 Corinthians",ch:13},{name:"Galatians",ch:6},
      {name:"Ephesians",ch:6},{name:"Philippians",ch:4},{name:"Colossians",ch:4},
      {name:"1 Thessalonians",ch:5},{name:"2 Thessalonians",ch:3},{name:"1 Timothy",ch:6},
      {name:"2 Timothy",ch:4},{name:"Titus",ch:3},{name:"Philemon",ch:1},
      {name:"Hebrews",ch:13},{name:"James",ch:5},{name:"1 Peter",ch:5},
      {name:"2 Peter",ch:3},{name:"1 John",ch:5},{name:"2 John",ch:1},
      {name:"3 John",ch:1},{name:"Jude",ch:1},{name:"Revelation",ch:22}
    ];

    const ALL = [];
    BOOKS.forEach((b, bi) => {
      for (let c = 1; c <= b.ch; c++) ALL.push({ bi, ch: c });
    });
    const TOTAL = ALL.length;
    let pos = ALL.findIndex(a => a.bi === 20 && a.ch === 1);
    let navOpen = false;

    const API = 'https://dailybible.ca/api/';
    const cache = {};
    const track = document.getElementById('swipeTrack');
    const container = document.getElementById('swipeContainer');
    const headerTitle = document.getElementById('headerTitle');
    const readingView = document.getElementById('readingView');
    const navView = document.getElementById('navView');
    const navInner = document.getElementById('navInner');
    const loadingEl = document.getElementById('loading');

    function lbl(p) { const e = ALL[p]; return BOOKS[e.bi].name.toUpperCase() + ' ' + e.ch; }

    function updateLabel() {
      const t = lbl(pos);
      headerTitle.textContent = t;
      document.title = t;
    }

    // NAV
    function buildNavOnce() {
      let html = '';
      BOOKS.forEach((b, bi) => {
        html += '<div class="nav-book" id="nb-' + bi + '" data-bi="' + bi + '">' + b.name + '</div>';
      });
      navInner.innerHTML = html;

      navInner.addEventListener('click', function(e) {
        const el = e.target.closest('.nav-book');
        if (!el) return;
        const bi = parseInt(el.dataset.bi);
        const np = ALL.findIndex(a => a.bi === bi && a.ch === 1);
        if (np >= 0) {
          navOpen = false;
          navView.style.display = 'none';
          readingView.style.display = 'block';
          if (np !== pos) jumpTo(np);
        }
      });
    }

    function markCurrent() {
      const curBi = ALL[pos].bi;
      navInner.querySelectorAll('.nav-book').forEach(el => {
        el.classList.toggle('current', parseInt(el.dataset.bi) === curBi);
      });
    }

    function toggle() {
      navOpen = !navOpen;
      if (navOpen) {
        markCurrent();
        readingView.style.display = 'none';
        navView.style.display = 'block';
        const el = document.getElementById('nb-' + ALL[pos].bi);
        if (el) setTimeout(() => el.scrollIntoView({ block: 'start' }), 20);
      } else {
        navView.style.display = 'none';
        readingView.style.display = 'block';
      }
    }

    // FETCH
    async function fetchChapter(idx) {
      if (idx < 0 || idx >= TOTAL) return null;
      const e = ALL[idx];
      const book = BOOKS[e.bi];
      const apiName = book.api || book.name;
      const key = apiName + '+' + e.ch;
      if (cache[key]) return cache[key];
      try {
        const res = await fetch(API + encodeURIComponent(apiName) + '+' + e.ch + '?translation=kjv');
        const data = await res.json();
        const verses = data.verses.map(v => v.text);
        cache[key] = verses;
        return verses;
      } catch (e) {
        return ['Failed to load. Try again.'];
      }
    }

    function panelHTML(verses) {
      if (!verses) return '<div class="chapter-scroll"></div>';
      let h = '<div class="chapter-scroll">';
      verses.forEach(v => { h += '<p class="verse">' + v + '</p>'; });
      h += '<div class="bottom-spacer"></div></div>';
      return h;
    }

    // 3-PANEL
    async function buildPanels() {
      const cur = await fetchChapter(pos);
      track.innerHTML =
        '<div class="ch-panel" data-slot="0"><div class="chapter-scroll"></div></div>' +
        '<div class="ch-panel" data-slot="1">' + panelHTML(cur) + '</div>' +
        '<div class="ch-panel" data-slot="2"><div class="chapter-scroll"></div></div>';
      track.style.transition = 'none';
      track.style.transform = 'translateX(-33.333%)';
      updateLabel();
      if (pos > 0) fetchChapter(pos - 1).then(v => {
        const el = track.querySelector('[data-slot="0"]'); if (el) el.innerHTML = panelHTML(v);
      });
      if (pos < TOTAL - 1) fetchChapter(pos + 1).then(v => {
        const el = track.querySelector('[data-slot="2"]'); if (el) el.innerHTML = panelHTML(v);
      });
    }

    async function jumpTo(np) {
      pos = np;
      loadingEl.style.display = 'flex';
      readingView.style.display = 'none';
      await buildPanels();
      loadingEl.style.display = 'none';
      readingView.style.display = 'block';
    }

    async function slideTo(dir) {
      const np = pos + dir;
      if (np < 0 || np >= TOTAL) {
        track.style.transition = 'transform 0.3s cubic-bezier(0.16,1,0.3,1)';
        track.style.transform = 'translateX(-33.333%)';
        return;
      }
      track.style.transition = 'transform 0.3s cubic-bezier(0.16,1,0.3,1)';
      track.style.transform = 'translateX(' + (dir === 1 ? '-66.666%' : '0%') + ')';
      await new Promise(r => setTimeout(r, 300));
      pos = np;
      await buildPanels();
    }

    // SWIPE
    let sx=0, sy=0, dx=0, drag=false, horiz=null;
    container.addEventListener('touchstart', e => {
      if (navOpen) return;
      sx=e.touches[0].clientX; sy=e.touches[0].clientY;
      dx=0; drag=true; horiz=null;
      track.style.transition='none';
    }, {passive:true});
    container.addEventListener('touchmove', e => {
      if (!drag||navOpen) return;
      const mx=e.touches[0].clientX-sx, my=e.touches[0].clientY-sy;
      if (horiz===null&&(Math.abs(mx)>8||Math.abs(my)>8)) horiz=Math.abs(mx)>Math.abs(my);
      if (horiz===false){drag=false;return;}
      if (horiz){e.preventDefault();dx=mx;
        track.style.transform='translateX('+(-33.333+dx/container.offsetWidth*33.333)+'%)';}
    }, {passive:false});
    container.addEventListener('touchend', () => {
      if (!drag||!horiz){drag=false;return;}
      drag=false;
      const thr=container.offsetWidth*0.2;
      if (dx<-thr) slideTo(1);
      else if (dx>thr) slideTo(-1);
      else {track.style.transition='transform 0.3s cubic-bezier(0.16,1,0.3,1)';
        track.style.transform='translateX(-33.333%)';}
    });

    // INIT
    (async () => {
      buildNavOnce();
      loadingEl.style.display = 'flex';
      readingView.style.display = 'none';
      await buildPanels();
      loadingEl.style.display = 'none';
      readingView.style.display = 'block';
    })();
  </script>
</body>
</html>
