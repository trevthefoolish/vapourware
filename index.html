<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ECCLESIASTES 1</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div class="desktop-message">
    <p>THIS IS DESIGNED FOR MOBILE</p>
    <div class="phone-frame">
      <div class="phone-notch"></div>
      <div class="phone-screen">
        <p class="phone-preview-text">Vanity of vanities,<br>saith the Preacher,<br>vanity of vanities;<br>all is vanity.</p>
      </div>
    </div>
  </div>

  <div class="mobile-content">
    <div class="header" onclick="openNav()">
      <span id="headerTitle">ECCLESIASTES 1</span>
    </div>

    <div class="reading-view" id="readingView">
      <div class="swipe-container" id="swipeContainer">
        <div class="swipe-track" id="swipeTrack">
          <div class="ch-panel" id="p0"><div class="chapter-scroll"></div></div>
          <div class="ch-panel" id="p1"><div class="chapter-scroll"></div></div>
          <div class="ch-panel" id="p2"><div class="chapter-scroll"></div></div>
        </div>
      </div>
    </div>

    <div class="nav-view" id="navView">
      <div class="nav-title" onclick="closeNav()">
        <span id="navTitleText">ECCLESIASTES 1</span>
      </div>
      <div id="navInner"></div>
      <div class="nav-end"></div>
    </div>

    <div class="loading" id="loading">...</div>
  </div>

  <script>
    const NAMES = [
      "Genesis","Exodus","Leviticus","Numbers","Deuteronomy","Joshua",
      "Judges","Ruth","1 Samuel","2 Samuel","1 Kings","2 Kings",
      "1 Chronicles","2 Chronicles","Ezra","Nehemiah","Esther","Job",
      "Psalms","Proverbs","Ecclesiastes","Song of Solomon","Isaiah","Jeremiah",
      "Lamentations","Ezekiel","Daniel","Hosea","Joel","Amos",
      "Obadiah","Jonah","Micah","Nahum","Habakkuk","Zephaniah",
      "Haggai","Zechariah","Malachi",
      "Matthew","Mark","Luke","John","Acts","Romans",
      "1 Corinthians","2 Corinthians","Galatians","Ephesians","Philippians","Colossians",
      "1 Thessalonians","2 Thessalonians","1 Timothy","2 Timothy","Titus","Philemon",
      "Hebrews","James","1 Peter","2 Peter","1 John","2 John","3 John","Jude","Revelation"
    ];

    const CHS = [50,40,27,36,34,24,21,4,31,24,22,25,29,36,10,13,10,42,
      150,31,12,8,66,52,5,48,12,14,3,9,1,4,7,3,3,3,2,14,4,
      28,16,24,21,28,16,16,13,6,6,4,4,5,3,6,4,3,1,13,5,5,3,5,1,1,1,22];

    const ALL = [];
    CHS.forEach((n, bi) => { for (let c = 0; c < n; c++) ALL.push({ bi, ch: c }); });
    const TOTAL = ALL.length;

    let pos = ALL.findIndex(a => a.bi === 20 && a.ch === 0);
    let navOpen = false, sliding = false;
    const cache = {};

    const track = document.getElementById('swipeTrack');
    const container = document.getElementById('swipeContainer');
    const headerTitle = document.getElementById('headerTitle');
    const readingView = document.getElementById('readingView');
    const navView = document.getElementById('navView');
    const navTitleText = document.getElementById('navTitleText');
    const navInner = document.getElementById('navInner');
    const loadingEl = document.getElementById('loading');
    const panels = [document.getElementById('p0'), document.getElementById('p1'), document.getElementById('p2')];

    function lbl(p) { const e = ALL[p]; return NAMES[e.bi].toUpperCase() + ' ' + (e.ch + 1); }
    function updateLabel() { const t = lbl(pos); headerTitle.textContent = t; document.title = t; }

    // NAV
    (function buildNav() {
      let h = '';
      NAMES.forEach((name, bi) => {
        h += '<div class="nav-book" id="nb-' + bi + '" data-bi="' + bi + '">' + name + '</div>';
      });
      navInner.innerHTML = h;
      navInner.addEventListener('click', e => {
        const el = e.target.closest('.nav-book');
        if (!el) return;
        const np = ALL.findIndex(a => a.bi === parseInt(el.dataset.bi) && a.ch === 0);
        closeNav();
        if (np >= 0 && np !== pos) { pos = np; fillAllPanels(); }
      });
    })();

    function openNav() {
      navOpen = true;
      navTitleText.textContent = lbl(pos);
      const curBi = ALL[pos].bi;
      navInner.querySelectorAll('.nav-book').forEach(el =>
        el.classList.toggle('current', parseInt(el.dataset.bi) === curBi));
      document.querySelector('.header').style.display = 'none';
      readingView.style.display = 'none';
      navView.style.display = 'block';
      const el = document.getElementById('nb-' + curBi);
      if (el) setTimeout(() => el.scrollIntoView({ block: 'start' }), 20);
    }

    function closeNav() {
      navOpen = false;
      navView.style.display = 'none';
      document.querySelector('.header').style.display = '';
      readingView.style.display = 'block';
    }

    // RENDER
    async function fillPanel(panel, p) {
      const scroll = document.createElement('div');
      scroll.className = 'chapter-scroll';
      scroll.dataset.p = p;
      panel.innerHTML = '';
      panel.appendChild(scroll);
      if (p === null || p < 0 || p >= TOTAL) return;

      const e = ALL[p];
      let v = 0;
      while (true) {
        const key = e.bi + ':' + e.ch + ':' + v;
        let data = cache[key];
        if (!data) {
          try {
            const res = await fetch('./api/render/' + e.bi + '/' + e.ch + '/' + v);
            if (!res.ok) break;
            data = await res.json();
            cache[key] = data;
          } catch { break; }
        }
        if (!scroll.isConnected || scroll.dataset.p != p) return;

        const wrap = document.createElement('div');
        wrap.className = 'verse-wrap';
        const vEl = document.createElement('p');
        vEl.className = 'verse';
        vEl.textContent = data.rendering;
        wrap.appendChild(vEl);
        if (data.note) {
          const nEl = document.createElement('p');
          nEl.className = 'note';
          nEl.textContent = data.note;
          wrap.appendChild(nEl);
        }
        scroll.appendChild(wrap);
        v++;
      }
      if (scroll.isConnected && scroll.dataset.p == p) {
        const spacer = document.createElement('div');
        spacer.className = 'bottom-spacer';
        scroll.appendChild(spacer);
      }
    }

    function fillAllPanels() {
      fillPanel(panels[0], pos > 0 ? pos - 1 : null);
      fillPanel(panels[1], pos);
      fillPanel(panels[2], pos < TOTAL - 1 ? pos + 1 : null);
      track.style.transition = 'none';
      track.style.transform = 'translateX(-33.333%)';
      updateLabel();
    }

    // SWIPE
    async function slideTo(dir) {
      if (sliding) return;
      const np = pos + dir;
      if (np < 0 || np >= TOTAL) {
        track.style.transition = 'transform 0.3s cubic-bezier(0.16,1,0.3,1)';
        track.style.transform = 'translateX(-33.333%)';
        return;
      }
      sliding = true;
      track.style.transition = 'transform 0.3s cubic-bezier(0.16,1,0.3,1)';
      track.style.transform = 'translateX(' + (dir === 1 ? '-66.666%' : '0%') + ')';
      await new Promise(r => setTimeout(r, 310));
      pos = np;
      requestAnimationFrame(() => { fillAllPanels(); sliding = false; });
    }

    let sx = 0, sy = 0, dx = 0, drag = false, horiz = null;
    container.addEventListener('touchstart', e => {
      if (navOpen || sliding) return;
      sx = e.touches[0].clientX; sy = e.touches[0].clientY;
      dx = 0; drag = true; horiz = null; track.style.transition = 'none';
    }, { passive: true });
    container.addEventListener('touchmove', e => {
      if (!drag || navOpen || sliding) return;
      const mx = e.touches[0].clientX - sx, my = e.touches[0].clientY - sy;
      if (horiz === null && (Math.abs(mx) > 6 || Math.abs(my) > 6)) horiz = Math.abs(mx) > Math.abs(my);
      if (horiz === false) { drag = false; return; }
      if (horiz) { e.preventDefault(); dx = mx;
        track.style.transform = 'translateX(' + (-33.333 + dx / container.offsetWidth * 33.333) + '%)'; }
    }, { passive: false });
    container.addEventListener('touchend', () => {
      if (!drag || !horiz) { drag = false; return; }
      drag = false; const thr = container.offsetWidth * 0.15;
      if (dx < -thr) slideTo(1);
      else if (dx > thr) slideTo(-1);
      else { track.style.transition = 'transform 0.3s cubic-bezier(0.16,1,0.3,1)';
        track.style.transform = 'translateX(-33.333%)'; }
    });

    // INIT
    fillAllPanels();
    loadingEl.style.display = 'none';
    readingView.style.display = 'block';
  </script>
</body>
</html>
